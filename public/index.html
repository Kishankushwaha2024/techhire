<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobHire — Find Your Dream Job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Job<span>Hive</span></div>
    <div class="nav-links">
      <a href="/" class="active">Jobs</a>
      <a href="/pages/my-applications.html" id="myAppsLink" style="display:none">My Applications</a>
      <a href="/pages/employer.html" id="employerLink" style="display:none">My Dashboard</a>
      <a href="/pages/admin.html" id="adminLink" style="display:none">Admin</a>
      <a href="/pages/login.html" id="loginLink">Login</a>
      <a href="/pages/register.html" id="registerLink">Register</a>
      <button onclick="logout()" id="logoutBtn" style="display:none" class="btn-logout">Logout</button>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Find Your <span class="highlight">Dream Job</span> Today</h1>
      <p>Thousands of opportunities waiting for you</p>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Job title, company, keyword..." />
        <input type="text" id="locationInput" placeholder="Location..." />
        <select id="typeFilter">
          <option value="">All Types</option>
          <option value="Full-Time">Full-Time</option>
          <option value="Part-Time">Part-Time</option>
          <option value="Remote">Remote</option>
          <option value="Internship">Internship</option>
        </select>
        <button onclick="searchJobs()" class="btn-search">Search</button>
      </div>
    </div>
    <div class="hero-bg"></div>
  </header>

  <main class="container">
    <div class="section-header">
      <h2>Latest Jobs</h2>
      <span id="jobCount" class="job-count"></span>
    </div>
    <div id="jobsGrid" class="jobs-grid">
      <div class="loading">Loading jobs...</div>
    </div>
  </main>

  <!-- Apply Modal -->
  <div id="applyModal" class="modal" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Apply for Job</h3>
        <button onclick="closeModal()" class="close-btn">✕</button>
      </div>
      <div id="modalJobTitle" class="modal-job-title"></div>
      <div class="form-group">
        <label>Resume (PDF/DOC, max 5MB)</label>
        <input type="file" id="resumeFile" accept=".pdf,.doc,.docx"/>
      </div>
      <div class="form-group">
        <label>Cover Letter (optional)</label>
        <textarea id="coverLetter" rows="4" placeholder="Tell us why you're a great fit..."></textarea>
      </div>
      <button onclick="submitApplication()" class="btn-primary">Submit Application</button>
      <div id="applyMsg" class="msg"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 JobHire — Built with TechHire team</p>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
