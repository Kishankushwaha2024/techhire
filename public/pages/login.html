<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — TechHire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
  <nav class="navbar">
    <a href="/" class="nav-brand">Tech<span>Hire</span></a>
  </nav>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Login to your TechHire account</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>
      <button onclick="login()" class="btn-primary full-width">Login</button>
      <div id="msg" class="msg"></div>
      <p class="auth-link">No account? <a href="/pages/register.html">Register here</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error; msg.className = "msg error"; return; }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        msg.textContent = "Login successful! Redirecting...";
        msg.className = "msg success";
        setTimeout(() => {
          if (data.user.role === "admin") window.location.href = "/pages/admin.html";
          else if (data.user.role === "employer") window.location.href = "/pages/employer.html";
          else window.location.href = "/";
        }, 1000);
      } catch {
        msg.textContent = "Server error. Try again.";
        msg.className = "msg error";
      }
    }
    document.addEventListener("keypress", e => { if(e.key === "Enter") login(); });
  </script>
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Tech<span>Hire</span></div>
      <div class="footer-tagline">Your gateway to the best tech opportunities</div>
      <hr class="footer-divider"/>
      <div class="footer-dev-label">Developed by</div>
      <div class="footer-developers">
        <span class="footer-dev-chip">Kishan Kushwaha</span>
        <span class="footer-dev-chip">Akhand Pratap Singh</span>
        <span class="footer-dev-chip">Aditya Soni</span>
        <span class="footer-dev-chip">Shivansh Mishra</span>
      </div>
      <div class="footer-copy">&copy; 2025 TechHire &mdash; All Rights Reserved</div>
    </div>
  </footer>
</body>
</html>
