<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — JobHive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
  <nav class="navbar">
    <a href="/" class="nav-brand">Job<span>Hive</span></a>
  </nav>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="auth-sub">Join JobHive and find your dream job</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters"/>
      </div>
      <button onclick="register()" class="btn-primary full-width">Create Account</button>
      <div id="msg" class="msg"></div>
      <p class="auth-link">Already have an account? <a href="/pages/login.html">Login here</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");
      if (!name || !email || !password) { msg.textContent = "All fields required"; msg.className = "msg error"; return; }
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error; msg.className = "msg error"; return; }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        msg.textContent = "Account created! Redirecting...";
        msg.className = "msg success";
        setTimeout(() => window.location.href = "/", 1000);
      } catch {
        msg.textContent = "Server error. Try again.";
        msg.className = "msg error";
      }
    }
  </script>
</body>
</html>
