<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — TechHire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
  <nav class="navbar">
    <a href="/" class="nav-brand">Tech<span>Hire</span></a>
  </nav>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="auth-sub">Join TechHire and find your dream job</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>I am a</label>
        <div style="display:flex;gap:1rem;margin-top:.4rem">
          <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.95rem">
            <input type="radio" name="role" value="user" checked/> Job Seeker
          </label>
          <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.95rem">
            <input type="radio" name="role" value="employer"/> Employer / Recruiter
          </label>
        </div>
      </div>
      <button onclick="register()" class="btn-primary full-width">Create Account</button>
      <div id="msg" class="msg"></div>
      <p class="auth-link">Already have an account? <a href="/pages/login.html">Login here</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const msg = document.getElementById("msg");
      if (!name || !email || !password) { msg.textContent = "All fields required"; msg.className = "msg error"; return; }
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password, role }),
        });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error; msg.className = "msg error"; return; }
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        msg.textContent = "Account created! Redirecting...";
        msg.className = "msg success";
        setTimeout(() => {
          if (data.user.role === "employer") window.location.href = "/pages/employer.html";
          else window.location.href = "/";
        }, 1000);
      } catch {
        msg.textContent = "Server error. Try again.";
        msg.className = "msg error";
      }
    }
  </script>
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Tech<span>Hire</span></div>
      <div class="footer-tagline">Your gateway to the best tech opportunities</div>
      <hr class="footer-divider"/>
      <div class="footer-dev-label">Developed by</div>
      <div class="footer-developers">
        <span class="footer-dev-chip">Kishan Kushwaha</span>
        <span class="footer-dev-chip">Akhand Pratap Singh</span>
        <span class="footer-dev-chip">Aditya Soni</span>
        <span class="footer-dev-chip">Shivansh Mishra</span>
      </div>
      <div class="footer-copy">&copy; 2025 TechHire &mdash; All Rights Reserved</div>
    </div>
  </footer>
</body>
</html>
