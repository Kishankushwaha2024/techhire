<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — TechHire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Job<span>Hive</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="admin-container container">
    <h2 class="admin-title">Admin Panel</h2>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('jobs')">Jobs</button>
      <button class="tab-btn" onclick="showTab('applications')">Applications</button>
      <button class="tab-btn" onclick="showTab('users')">Users</button>
    </div>

    <!-- JOBS TAB -->
    <div id="tab-jobs" class="tab-content">
      <div class="admin-card">
        <h3>Add New Job</h3>
        <div class="grid-2">
          <div class="form-group"><label>Job Title *</label><input type="text" id="jobTitle" placeholder="e.g. Software Engineer"/></div>
          <div class="form-group"><label>Company *</label><input type="text" id="jobCompany" placeholder="e.g. TechCorp"/></div>
          <div class="form-group"><label>Location</label><input type="text" id="jobLocation" placeholder="e.g. Mumbai"/></div>
          <div class="form-group"><label>Salary</label><input type="text" id="jobSalary" placeholder="e.g. ₹5-8 LPA"/></div>
          <div class="form-group">
            <label>Type</label>
            <select id="jobType">
              <option value="Full-Time">Full-Time</option>
              <option value="Part-Time">Part-Time</option>
              <option value="Remote">Remote</option>
              <option value="Internship">Internship</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description</label><textarea id="jobDesc" rows="3" placeholder="Job description..."></textarea></div>
        <div class="form-group"><label>Requirements</label><textarea id="jobReq" rows="3" placeholder="Skills & requirements..."></textarea></div>
        <button onclick="addJob()" class="btn-primary">Add Job</button>
        <div id="jobMsg" class="msg"></div>
      </div>

      <h3 style="margin-top:2rem">All Jobs</h3>
      <div id="adminJobsList"></div>
    </div>

    <!-- APPLICATIONS TAB -->
    <div id="tab-applications" class="tab-content" style="display:none">
      <h3>All Applications</h3>
      <div id="applicationsList"></div>
    </div>

    <!-- USERS TAB -->
    <div id="tab-users" class="tab-content" style="display:none">
      <h3>All Users</h3>
      <div id="usersList"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
